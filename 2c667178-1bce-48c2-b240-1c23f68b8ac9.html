<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Bản đồ Việt Nam và Biển Đông sử dụng mã nguồn Vietflex từ GitHub.">
  <title>Vietflex · Bản đồ Việt Nam</title>

  <!-- Tải trực tiếp Vietflex từ repository công khai Vietflexmap/VN. -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/Vietflexmap/VN@main/dist/vietflex.css"
  >

  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --vf-red: #da251d;
      --vf-yellow: #ffdf00;
      --vf-ink: #172554;
      --vf-panel: rgba(255, 255, 255, 0.94);
    }

    * { box-sizing: border-box; }

    html,
    body,
    #map {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: #dbeafe;
    }

    #map { z-index: 1; }

    .toolbar {
      position: fixed;
      z-index: 1000;
      top: max(14px, env(safe-area-inset-top));
      right: max(14px, env(safe-area-inset-right));
      display: flex;
      align-items: center;
      gap: 10px;
      width: min(720px, calc(100% - 84px));
      padding: 10px;
      border: 1px solid rgba(23, 37, 84, 0.12);
      border-radius: 16px;
      background: var(--vf-panel);
      box-shadow: 0 12px 34px rgba(15, 23, 42, 0.2);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
      margin-right: auto;
      color: var(--vf-ink);
      text-decoration: none;
    }

    .flag {
      position: relative;
      flex: 0 0 auto;
      width: 42px;
      height: 28px;
      overflow: hidden;
      border-radius: 6px;
      background: var(--vf-red);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.1);
    }

    .flag::after {
      position: absolute;
      top: 50%;
      left: 50%;
      color: var(--vf-yellow);
      content: "★";
      font-size: 21px;
      line-height: 1;
      transform: translate(-50%, -53%);
    }

    .brand-copy { min-width: 0; }

    .brand strong,
    .brand span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand strong { font-size: 15px; }

    .brand span {
      color: #64748b;
      font-size: 11px;
    }

    .map-types {
      display: flex;
      gap: 5px;
      padding: 4px;
      border-radius: 11px;
      background: #eef2ff;
    }

    .map-types button {
      padding: 8px 10px;
      border: 0;
      border-radius: 8px;
      color: #334155;
      background: transparent;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 650;
    }

    .map-types button:hover { background: #fff; }

    .map-types button[aria-pressed="true"] {
      color: #fff;
      background: var(--vf-red);
      box-shadow: 0 3px 10px rgba(218, 37, 29, 0.25);
    }

    .error {
      position: fixed;
      z-index: 2000;
      inset: 50% auto auto 50%;
      display: none;
      width: min(520px, calc(100% - 32px));
      padding: 22px;
      border: 1px solid #fecaca;
      border-radius: 16px;
      color: #7f1d1d;
      background: #fff;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.25);
      line-height: 1.55;
      transform: translate(-50%, -50%);
    }

    .error strong { display: block; margin-bottom: 6px; }

    @media (max-width: 680px) {
      .toolbar {
        align-items: stretch;
        flex-direction: column;
        left: 14px;
        right: 14px;
        width: auto;
      }

      .map-types { display: grid; grid-template-columns: repeat(3, 1fr); }
      .map-types button { padding: 8px 4px; font-size: 11px; }
      .brand span { display: none; }
      .leaflet-top.leaflet-left { top: 118px; }
    }
  </style>
</head>

<body>
  <header class="toolbar" aria-label="Thanh công cụ bản đồ">
    <a
      class="brand"
      href="https://github.com/Vietflexmap/VN"
      target="_blank"
      rel="noopener noreferrer"
      title="Mở mã nguồn Vietflexmap/VN trên GitHub"
    >
      <span class="flag" aria-hidden="true"></span>
      <span class="brand-copy">
        <strong>Vietflex · Việt Nam</strong>
        <span>Mã nguồn: github.com/Vietflexmap/VN · Tải trực tiếp qua CDN</span>
      </span>
    </a>

    <nav class="map-types" aria-label="Chọn lớp nền Google Maps">
      <button type="button" data-map-type="roadmap" aria-pressed="true">Đường phố</button>
      <button type="button" data-map-type="satellite" aria-pressed="false">Vệ tinh</button>
      <button type="button" data-map-type="hybrid" aria-pressed="false">Hỗn hợp</button>
    </nav>
  </header>

  <main id="map" aria-label="Bản đồ Việt Nam và Biển Đông"></main>

  <section id="error" class="error" role="alert">
    <strong>Không thể tải mã nguồn Vietflex.</strong>
    Hãy kiểm tra kết nối Internet hoặc chạy lại trang sau vài giây.
  </section>

  <script src="https://cdn.jsdelivr.net/gh/Vietflexmap/VN@main/dist/vietflex.js"></script>
  <script>
    try {
      const {
        Marker,
        ZoomControl,
        legacyGoogleTiles,
        vietflexMap
      } = window.Vietflex;

      const map = vietflexMap('map', {
        googleMaps: false,
        center: [15.8, 109.5],
        zoom: 5,
        minZoom: 4,
        attributionControl: false,
        zoomControl: false,
        maxBounds: [[0, 95], [27, 125]]
      });

      new ZoomControl({position: 'topleft'}).addTo(map);

      let baseLayer = null;

      function setMapType(mapType) {
        if (baseLayer) {
          map.removeLayer(baseLayer);
        }

        baseLayer = legacyGoogleTiles({mapType}).addTo(map);
        map.baseLayer = baseLayer;

        document.querySelectorAll('[data-map-type]').forEach((button) => {
          button.setAttribute(
            'aria-pressed',
            String(button.dataset.mapType === mapType)
          );
        });
      }

      setMapType('roadmap');

      const places = [
        {name: 'Hà Nội', coordinates: [21.0285, 105.8542]},
        {name: 'Đà Nẵng', coordinates: [16.0544, 108.2022]},
        {name: 'Thành phố Hồ Chí Minh', coordinates: [10.7769, 106.7009]}
      ];

      places.forEach(({name, coordinates}) => {
        new Marker(coordinates)
          .bindPopup(`<strong>${name}</strong><br>Bản đồ thử nghiệm Vietflex`)
          .addTo(map);
      });

      document.querySelectorAll('[data-map-type]').forEach((button) => {
        button.addEventListener('click', () => setMapType(button.dataset.mapType));
      });
    } catch (error) {
      document.querySelector('#error').style.display = 'block';
      console.error('Vietflex initialization failed:', error);
    }
  </script>
</body>
</html>
